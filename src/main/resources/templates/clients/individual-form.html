<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Физическо лице')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">

    <div class="page-title-bar mb-4">
        <h2>
            <i class="fa-solid fa-user"></i>
            <span th:if="${isEdit}">Редактиране на физическо лице</span>
            <span th:unless="${isEdit}">Ново физическо лице</span>
        </h2>
        <a th:href="@{/clients}" class="btn btn-outline-secondary btn-sm">
            <i class="fa-solid fa-arrow-left me-1"></i>Назад
        </a>
    </div>

    <div class="card form-card">
        <div class="card-header bg-dark text-white">
            <i class="fa-solid fa-pen-to-square me-1"></i>Данни за клиента
        </div>
        <div class="card-body">
            <form th:object="${client}" method="post"
                  th:action="${isEdit} ? @{/clients/{id}/edit/individual(id=${clientId})} : @{/clients/new/individual}"
                  novalidate>
                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Име</label>
                        <input type="text" class="form-control" th:field="*{firstName}"
                               th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{firstName}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Фамилия</label>
                        <input type="text" class="form-control" th:field="*{lastName}"
                               th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{lastName}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">ЕГН</label>
                        <input type="text" class="form-control" th:field="*{egn}"
                               th:classappend="${#fields.hasErrors('egn')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{egn}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Потребителско име <span class="text-muted">(незадължително)</span></label>
                        <input type="text" class="form-control" th:field="*{username}"/>
                        <div class="form-text">За свързване с акаунт за вход на клиента.</div>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-dark"><i class="fa-solid fa-floppy-disk me-1"></i>Запази</button>
                    <a th:href="@{/clients}" class="btn btn-outline-secondary">Отказ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
