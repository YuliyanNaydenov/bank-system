<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Нов служител')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">

    <div class="page-title-bar mb-4">
        <h2><i class="fa-solid fa-user-tie"></i> Нов служител</h2>
        <a th:href="@{/employees}" class="btn btn-outline-secondary btn-sm">
            <i class="fa-solid fa-arrow-left me-1"></i>Назад
        </a>
    </div>

    <div class="card form-card">
        <div class="card-header bg-dark text-white">
            <i class="fa-solid fa-user-plus me-1"></i>Данни за достъп
        </div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:object="${employee}" th:action="@{/employees/new}" method="post" novalidate>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Потребителско име</label>
                        <input type="text" class="form-control" th:field="*{username}"
                               th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{username}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Парола</label>
                        <input type="password" class="form-control" th:field="*{password}"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Повтори паролата</label>
                        <input type="password" class="form-control" th:field="*{confirmPassword}"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                    </div>
                </div>
                <div class="alert alert-light border mt-3 mb-0">
                    <i class="fa-solid fa-circle-info me-1"></i>
                    Новият потребител получава роля <code>employee</code> и достъп до клиенти, сметки и кредити.
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-dark"><i class="fa-solid fa-floppy-disk me-1"></i>Създай служител</button>
                    <a th:href="@{/employees}" class="btn btn-outline-secondary">Отказ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
