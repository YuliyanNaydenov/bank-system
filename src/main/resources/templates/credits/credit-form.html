<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Отпускане на кредит')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">

    <div class="page-title-bar mb-4">
        <h2><i class="fa-solid fa-hand-holding-dollar"></i> Отпускане на кредит</h2>
        <a th:href="@{/credits}" class="btn btn-outline-secondary btn-sm">
            <i class="fa-solid fa-arrow-left me-1"></i>Назад
        </a>
    </div>

    <div class="card form-card">
        <div class="card-header bg-dark text-white">
            <i class="fa-solid fa-plus me-1"></i>Нов кредит
        </div>
        <div class="card-body">
            <form th:object="${credit}" th:action="@{/credits/new}" method="post" novalidate>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Клиент</label>
                        <select class="form-select" th:field="*{clientId}"
                                th:classappend="${#fields.hasErrors('clientId')} ? 'is-invalid'">
                            <option value="">— Изберете клиент —</option>
                            <option th:each="c : ${allClients}" th:value="${c.id}"
                                    th:text="${c.displayName + ' (' + c.identifier + ')'}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{clientId}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Вид кредит</label>
                        <select class="form-select" th:field="*{creditTypeId}"
                                th:classappend="${#fields.hasErrors('creditTypeId')} ? 'is-invalid'">
                            <option value="">— Изберете вид —</option>
                            <option th:each="t : ${allCreditTypes}" th:value="${t.id}"
                                    th:text="${t.name + ' — ' + #numbers.formatDecimal(t.annualInterestRate,1,2) + '%, до ' + #numbers.formatDecimal(t.maxAmount,1,0) + ' лв., до ' + t.maxTermMonths + ' мес.'}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{creditTypeId}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Сума (лв.)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" th:field="*{amount}"
                               th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{amount}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Срок (месеци)</label>
                        <input type="number" min="1" class="form-control" th:field="*{termMonths}"
                               th:classappend="${#fields.hasErrors('termMonths')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{termMonths}"></div>
                    </div>
                </div>
                <div class="alert alert-light border mt-3 mb-0">
                    <i class="fa-solid fa-circle-info me-1"></i>
                    При отпускане се генерира анюитетен погасителен план. Сумата и срокът не могат да надвишават
                    лимитите на избрания вид кредит.
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-dark"><i class="fa-solid fa-check me-1"></i>Отпусни кредит</button>
                    <a th:href="@{/credits}" class="btn btn-outline-secondary">Отказ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
