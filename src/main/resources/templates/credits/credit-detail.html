<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Погасителен план')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div th:replace="~{fragments :: toasts}"></div>
<div class="container pb-4">

    <div class="page-title-bar mb-3">
        <h2><i class="fa-solid fa-file-invoice-dollar"></i> Кредит #<span th:text="${credit.id}"></span></h2>
        <div class="d-flex gap-2">
            <a sec:authorize="hasAnyAuthority('admin','employee')" th:href="@{/credits}" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-arrow-left me-1"></i>Към кредитите
            </a>
            <a sec:authorize="hasAuthority('client')" th:href="@{/my}" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-arrow-left me-1"></i>Към профила
            </a>
        </div>
    </div>

    <!-- ── Обобщение ──────────────────────────────────────────────────────── -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="kv-grid">
                <div class="kv-tile">
                    <div class="kv-label">Клиент</div>
                    <div class="kv-value" th:text="${credit.clientName}"></div>
                </div>
                <div class="kv-tile">
                    <div class="kv-label">Вид кредит</div>
                    <div class="kv-value" th:text="${credit.creditTypeName}"></div>
                </div>
                <div class="kv-tile">
                    <div class="kv-label">Годишна лихва</div>
                    <div class="kv-value" th:text="${#numbers.formatDecimal(credit.annualInterestRate,1,2)} + ' %'"></div>
                </div>
                <div class="kv-tile">
                    <div class="kv-label">Статус</div>
                    <div class="kv-value">
                        <span th:if="${credit.status == 'ACTIVE'}" class="badge bg-warning text-dark">Активен</span>
                        <span th:if="${credit.status == 'PAID'}" class="badge bg-success">Изплатен</span>
                    </div>
                </div>
                <div class="kv-tile">
                    <div class="kv-label">Отпусната сума</div>
                    <div class="kv-value" th:text="${#numbers.formatDecimal(credit.amount,1,2)} + ' лв.'"></div>
                </div>
                <div class="kv-tile">
                    <div class="kv-label">Срок</div>
                    <div class="kv-value" th:text="${credit.termMonths} + ' мес.'"></div>
                </div>
                <div class="kv-tile">
                    <div class="kv-label">Месечна вноска</div>
                    <div class="kv-value accent" th:text="${#numbers.formatDecimal(credit.monthlyPayment,1,2)} + ' лв.'"></div>
                </div>
                <div class="kv-tile">
                    <div class="kv-label">Общо за връщане</div>
                    <div class="kv-value" th:text="${#numbers.formatDecimal(credit.totalToRepay,1,2)} + ' лв.'"></div>
                </div>
                <div class="kv-tile">
                    <div class="kv-label">Остатък за плащане</div>
                    <div class="kv-value danger" th:text="${#numbers.formatDecimal(credit.remainingBalance,1,2)} + ' лв.'"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Погасителен план ───────────────────────────────────────────────── -->
    <div class="card">
        <div class="card-header bg-dark text-white">
            <i class="fa-solid fa-table-list me-1"></i>Погасителен план (анюитетен)
        </div>
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Месец</th><th>Вноска</th><th>Главница</th><th>Лихва</th>
                        <th>Остатък</th><th>Статус</th>
                        <th sec:authorize="hasAnyAuthority('admin','employee')">Действие</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${credit.installments}" th:classappend="${i.paid} ? 'table-success' : ''">
                        <td th:text="${i.monthNumber}"></td>
                        <td th:text="${#numbers.formatDecimal(i.paymentAmount,1,2)}"></td>
                        <td th:text="${#numbers.formatDecimal(i.principalPart,1,2)}"></td>
                        <td th:text="${#numbers.formatDecimal(i.interestPart,1,2)}"></td>
                        <td th:text="${#numbers.formatDecimal(i.remainingBalance,1,2)}"></td>
                        <td>
                            <span th:if="${i.paid}" class="badge bg-success"><i class="fa-solid fa-check me-1"></i>Платена</span>
                            <span th:unless="${i.paid}" class="badge bg-secondary">Чака</span>
                        </td>
                        <td sec:authorize="hasAnyAuthority('admin','employee')">
                            <form th:unless="${i.paid}"
                                  th:action="@{/credits/{cid}/installments/{iid}/pay(cid=${credit.id},iid=${i.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-success btn-action">
                                    <i class="fa-solid fa-money-bill-wave me-1"></i>Плати
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
