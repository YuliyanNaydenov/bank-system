<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Отпускане на кредит')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">

    <div class="page-title-bar mb-4">
        <h2><i class="fa-solid fa-hand-holding-dollar"></i> Отпускане на кредит</h2>
        <a th:href="@{/credits}" class="btn btn-outline-secondary btn-sm">
            <i class="fa-solid fa-arrow-left me-1"></i>Назад
        </a>
    </div>

    <div class="card form-card">
        <div class="card-header bg-dark text-white">
            <i class="fa-solid fa-plus me-1"></i>Нов кредит
        </div>
        <div class="card-body">
            <form th:object="${credit}" th:action="@{/credits/new}" method="post" novalidate>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Клиент</label>
                        <select class="form-select" th:field="*{clientId}"
                                th:classappend="${#fields.hasErrors('clientId')} ? 'is-invalid'">
                            <option value="">— Изберете клиент —</option>
                            <option th:each="c : ${allClients}" th:value="${c.id}"
                                    th:text="${c.displayName + ' (' + c.identifier + ')'}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{clientId}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Вид кредит</label>
                        <select class="form-select" th:field="*{creditTypeId}"
                                th:classappend="${#fields.hasErrors('creditTypeId')} ? 'is-invalid'">
                            <option value="">— Изберете вид —</option>
                            <option th:each="t : ${allCreditTypes}" th:value="${t.id}"
                                    th:attr="data-rate=${t.annualInterestRate},data-max=${t.maxAmount},data-term=${t.maxTermMonths}"
                                    th:text="${t.name + ' — ' + #numbers.formatDecimal(t.annualInterestRate,1,2) + '%, до ' + #numbers.formatDecimal(t.maxAmount,1,0) + ' €, до ' + t.maxTermMonths + ' мес.'}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{creditTypeId}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Сума (€)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" th:field="*{amount}"
                               th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{amount}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Срок (месеци)</label>
                        <input type="number" min="1" class="form-control" th:field="*{termMonths}"
                               th:classappend="${#fields.hasErrors('termMonths')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{termMonths}"></div>
                    </div>
                </div>
                <div class="alert alert-light border mt-3 mb-0">
                    <i class="fa-solid fa-circle-info me-1"></i>
                    При отпускане се генерира анюитетен погасителен план. Сумата и срокът не могат да надвишават
                    лимитите на избрания вид кредит.
                </div>

                <!-- Жив калкулатор (само ориентир, изчислява се в браузъра) -->
                <div id="calcOut" class="mt-3" style="display:none">
                    <div class="kv-grid">
                        <div class="kv-tile">
                            <div class="kv-label">Месечна вноска</div>
                            <div class="kv-value accent" id="calcMonthly">—</div>
                        </div>
                        <div class="kv-tile">
                            <div class="kv-label">Общо за връщане</div>
                            <div class="kv-value" id="calcTotal">—</div>
                        </div>
                        <div class="kv-tile">
                            <div class="kv-label">Обща лихва</div>
                            <div class="kv-value" id="calcInterest">—</div>
                        </div>
                    </div>
                    <div id="calcWarn" class="text-danger small mt-2" style="display:none">
                        <i class="fa-solid fa-triangle-exclamation me-1"></i>Сумата или срокът надвишават лимита на избрания вид.
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-dark"><i class="fa-solid fa-check me-1"></i>Отпусни кредит</button>
                    <a th:href="@{/credits}" class="btn btn-outline-secondary">Отказ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
<script>
    (function () {
        const typeSel = document.getElementById('creditTypeId');
        const amountEl = document.getElementById('amount');
        const termEl = document.getElementById('termMonths');
        const out = document.getElementById('calcOut');
        const moEl = document.getElementById('calcMonthly');
        const totEl = document.getElementById('calcTotal');
        const intEl = document.getElementById('calcInterest');
        const warnEl = document.getElementById('calcWarn');
        if (!typeSel) return;

        function fmt(n) {
            return n.toLocaleString('bg-BG', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
        }
        function calc() {
            const opt = typeSel.options[typeSel.selectedIndex];
            const rate = opt ? parseFloat(opt.getAttribute('data-rate')) : NaN;
            const maxAmount = opt ? parseFloat(opt.getAttribute('data-max')) : NaN;
            const maxTerm = opt ? parseInt(opt.getAttribute('data-term'), 10) : NaN;
            const P = parseFloat(amountEl.value);
            const n = parseInt(termEl.value, 10);
            if (!opt || !opt.value || isNaN(rate) || isNaN(P) || P <= 0 || isNaN(n) || n <= 0) {
                out.style.display = 'none';
                return;
            }
            const r = rate / 100 / 12;
            let monthly;
            if (r === 0) { monthly = P / n; }
            else { const pw = Math.pow(1 + r, n); monthly = P * r * pw / (pw - 1); }
            const total = monthly * n;
            moEl.textContent = fmt(monthly);
            totEl.textContent = fmt(total);
            intEl.textContent = fmt(total - P);
            const over = (!isNaN(maxAmount) && P > maxAmount) || (!isNaN(maxTerm) && n > maxTerm);
            warnEl.style.display = over ? '' : 'none';
            out.style.display = '';
        }
        typeSel.addEventListener('change', calc);
        amountEl.addEventListener('input', calc);
        termEl.addEventListener('input', calc);
    })();
</script>
</body>
</html>
