<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Юридическо лице')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">

    <div class="page-title-bar mb-4">
        <h2>
            <i class="fa-solid fa-building"></i>
            <span th:if="${isEdit}">Редактиране на юридическо лице</span>
            <span th:unless="${isEdit}">Ново юридическо лице</span>
        </h2>
        <a th:href="@{/clients}" class="btn btn-outline-secondary btn-sm">
            <i class="fa-solid fa-arrow-left me-1"></i>Назад
        </a>
    </div>

    <div class="card form-card">
        <div class="card-header bg-dark text-white">
            <i class="fa-solid fa-pen-to-square me-1"></i>Данни за фирмата
        </div>
        <div class="card-body">
            <form th:object="${client}" method="post"
                  th:action="${isEdit} ? @{/clients/{id}/edit/company(id=${clientId})} : @{/clients/new/company}"
                  novalidate>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Име на фирмата</label>
                        <input type="text" class="form-control" th:field="*{companyName}"
                               th:classappend="${#fields.hasErrors('companyName')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{companyName}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">ЕИК</label>
                        <input type="text" class="form-control" th:field="*{eik}"
                               th:classappend="${#fields.hasErrors('eik')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{eik}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Представител</label>
                        <input type="text" class="form-control" th:field="*{representativeName}"
                               th:classappend="${#fields.hasErrors('representativeName')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{representativeName}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Потребителско име <span class="text-muted">(незадължително)</span></label>
                        <input type="text" class="form-control" th:field="*{username}"/>
                        <div class="form-text">За свързване с акаунт за вход на клиента.</div>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-dark"><i class="fa-solid fa-floppy-disk me-1"></i>Запази</button>
                    <a th:href="@{/clients}" class="btn btn-outline-secondary">Отказ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
