<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Откриване на сметка')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">

    <div class="page-title-bar mb-4">
        <h2><i class="fa-solid fa-wallet"></i> Откриване на сметка</h2>
        <a th:href="@{/accounts}" class="btn btn-outline-secondary btn-sm">
            <i class="fa-solid fa-arrow-left me-1"></i>Назад
        </a>
    </div>

    <div class="card form-card">
        <div class="card-header bg-dark text-white">
            <i class="fa-solid fa-plus me-1"></i>Нова сметка
        </div>
        <div class="card-body">
            <form th:object="${account}" th:action="@{/accounts/new}" method="post" novalidate>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Притежател (клиент)</label>
                        <select class="form-select" th:field="*{ownerId}"
                                th:classappend="${#fields.hasErrors('ownerId')} ? 'is-invalid'">
                            <option value="">— Изберете клиент —</option>
                            <option th:each="c : ${allClients}" th:value="${c.id}"
                                    th:text="${c.displayName + ' (' + c.identifier + ')'}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{ownerId}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Начална наличност</label>
                        <input type="number" step="0.01" min="0" class="form-control" th:field="*{initialBalance}"
                               th:classappend="${#fields.hasErrors('initialBalance')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{initialBalance}"></div>
                        <div class="form-text">IBAN се генерира автоматично.</div>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-dark"><i class="fa-solid fa-floppy-disk me-1"></i>Открий сметка</button>
                    <a th:href="@{/accounts}" class="btn btn-outline-secondary">Отказ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
